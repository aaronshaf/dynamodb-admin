---
name: test

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
    name: Test and lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: pnpm install
        run: pnpm i
      - name: build
        run: pnpm build
      - name: Unittesting
        run: pnpm test
      - name: Linting
        run: pnpm lint
