---
name: test

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
    name: Test and lint
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - name: pnpm install
        run: pnpm i
      - name: build
        run: pnpm build
      - name: Unittesting
        run: pnpm test
      - name: Linting
        run: pnpm lint
